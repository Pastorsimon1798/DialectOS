name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      # Ensure GNU tar is available as 'gtar' (required by upload-pages-artifact)
      - name: Ensure gtar is available
        run: |
          if command -v gtar &> /dev/null; then
            echo "gtar already available"
            gtar --version | head -n 1
          elif command -v brew &> /dev/null; then
            echo "macOS runner detected — installing GNU tar via coreutils"
            brew install coreutils
            echo "Installed gtar:"
            gtar --version | head -n 1
          else
            echo "Creating gtar symlink to GNU tar"
            sudo ln -sf "$(command -v tar)" /usr/local/bin/gtar
            gtar --version | head -n 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke deployed Pages site
        run: node scripts/smoke-pages.mjs "${{ steps.deployment.outputs.page_url }}"
