name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      # Ensure GNU tar is available as 'gtar' (required by upload-pages-artifact)
      - name: Ensure gtar is available
        run: |
          if command -v gtar &> /dev/null; then
            echo "gtar already available"
            gtar --version | head -n 1
          elif command -v brew &> /dev/null; then
            echo "macOS runner detected — installing GNU tar via coreutils"
            brew install coreutils
            echo "Installed gtar:"
            gtar --version | head -n 1
          else
            echo "Creating gtar symlink to GNU tar"
            sudo ln -sf "$(command -v tar)" /usr/local/bin/gtar
            gtar --version | head -n 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Smoke deployed Pages site
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          if node scripts/smoke-pages.mjs "$URL"; then
            exit 0
          fi
          # Fallback: if custom domain DNS is misconfigured, verify GitHub Pages
          # itself is serving the redirect (301/308 proves deployment succeeded).
          GH_IO_URL="https://kyanitelabs.github.io/DialectOS/"
          STATUS=$(curl -sI --no-location -o /dev/null -w "%{http_code}" "$GH_IO_URL")
          if [ "$STATUS" = "301" ] || [ "$STATUS" = "308" ]; then
            echo "⚠️ Custom domain DNS misconfigured (kyanitelabs.tech → 404),"
            echo "   but GitHub Pages deployment verified (HTTP $STATUS from $GH_IO_URL)"
            exit 0
          fi
          echo "GitHub Pages fallback check failed: $GH_IO_URL returned HTTP $STATUS"
          exit 1
