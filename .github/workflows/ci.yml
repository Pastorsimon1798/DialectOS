name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Verify npm package contents
        run: |
          for pkg in packages/*; do
            [ -f "$pkg/package.json" ] || continue
            name="$(basename "$pkg")"
            if ! (cd "$pkg" && npm pack --dry-run) >/tmp/"$name"-pack.txt 2>&1; then
              echo "::error::npm pack failed for $pkg"
              cat /tmp/"$name"-pack.txt
              exit 1
            fi
            if grep -E 'src/__tests__|src/.*\.test\.ts|fixtures/' /tmp/"$name"-pack.txt; then
              echo "::error::Unexpected test/source fixture content in package $pkg"
              cat /tmp/"$name"-pack.txt
              exit 1
            fi
          done

      - run: pnpm test

      - name: Run coverage
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: matrix.node-version == 22
        with:
          name: coverage-reports
          path: |
            packages/*/coverage/
          retention-days: 14

  adversarial-ci:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: build-and-test
    strategy:
      matrix:
        node-version: [22, 24]

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run adversarial fixture corpus
        run: pnpm --filter=@dialectos/cli test:adversarial
