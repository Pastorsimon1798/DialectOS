changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - octocat
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🛡️ Security
      labels:
        - security
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🧪 Tests
      labels:
        - tests
    - title: 🔧 Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: Other Changes
      labels:
        - "*"
